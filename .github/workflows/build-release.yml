name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update the GitHub Release for the current app version"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode release keystore
        shell: bash
        run: |
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" && -n "${ANDROID_KEYSTORE_PASSWORD}" && -n "${ANDROID_KEY_ALIAS}" && -n "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release.keystore"
            echo "ANDROID_KEYSTORE_FILE=${RUNNER_TEMP}/release.keystore" >> "${GITHUB_ENV}"
            echo "Using release signing key from GitHub Secrets."
          else
            echo "Release signing secrets are incomplete; falling back to debug signing."
          fi

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleRelease

      - name: Prepare artifacts
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION_NAME="$(grep '^appVersionName=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          VERSION_CODE="$(grep '^appVersionCode=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${VERSION_NAME}"
          fi
          APK_SOURCE="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [[ -z "${APK_SOURCE}" ]]; then
            echo "No release APK found." >&2
            exit 1
          fi
          mkdir -p dist
          APK_NAME="fk-live-user-adv-${RELEASE_TAG}.apk"
          cp "${APK_SOURCE}" "dist/${APK_NAME}"
          sha256sum "dist/${APK_NAME}" > "dist/${APK_NAME}.sha256"
          {
            echo "version_name=${VERSION_NAME}"
            echo "version_code=${VERSION_CODE}"
            echo "release_tag=${RELEASE_TAG}"
            echo "apk_name=${APK_NAME}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: fk-live-user-adv-${{ steps.meta.outputs.release_tag }}
          path: |
            dist/*.apk
            dist/*.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
        shell: bash
        run: |
          set -euo pipefail
          NOTES=$'LSPosed 内容屏蔽助手自动构建\n\n- 版本：'"${VERSION_NAME}"$'\n- versionCode：'"${VERSION_CODE}"$'\n- 包名：moe.shiro.lsposed.contentfilter\n\n安装后需要在 LSPosed 中启用模块并勾选目标应用 scope。'
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/*.apk dist/*.sha256 --clobber
          else
            gh release create "${RELEASE_TAG}" dist/*.apk dist/*.sha256 \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --notes "${NOTES}"
          fi
